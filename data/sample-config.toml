# RustShot config — copy to ~/.config/rustshot/config.toml and tweak.
# All sections + keys are optional; missing values fall back to defaults.
#
# Annotation color and stroke width are deliberately not configurable —
# the overlay is keyboard-only, hardcoded to red + 4px.

[defaults]
counter_radius = 16.0                    # auto-counter bubble radius
pixelate_block = 10                      # pixelate block size in px (min 2)
save_dir = "~/Pictures/screenshots"      # used when no -p flag is given
filename_pattern = "%Y%m%d-%H%M%S.png"   # strftime format for auto-generated filenames

[capture]
include_cursor = false   # composite the X11 cursor into screenshots (XFixes)
